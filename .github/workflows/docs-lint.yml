# Markdown: markdownlint-cli2 auto-loads repo-root `.markdownlint.json`.
# Do not remove that file without updating rules here or restoring compatible defaults.
name: Documentation Quality

on:
  pull_request:
    paths:
      - '**/*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'

      # Operator docs reference local services (Qdrant/Ollama on localhost); exclude loopback from link check.
      - name: Link Check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude-loopback './**/*.md'

      - name: Structure Validation
        run: |
          set -e
          echo "Checking engineering system file completeness..."
          FAILED=0
          for dir in engineering-systems/*/; do
            [ -d "$dir" ] || continue
            for file in README.md business-context.md architecture.md implementation.md validation.md; do
              if [ ! -f "${dir}${file}" ]; then
                echo "MISSING: ${dir}${file}"
                FAILED=1
              fi
            done
          done
          if [ "$FAILED" -ne 0 ]; then exit 1; fi
          echo "All systems complete."
