name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.md'
      - 'engineering-systems/**'

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for API Key
        id: check_key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ] && [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "No API key found. Skipping automated review."
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Run AI Review Script
        if: steps.check_key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Wire LLM here: diff against base + system prompt from:
          #   .github/code-review/codereview.md  (code-reviewer — plan alignment, code quality)
          #   .github/code-review/CHECKLIST.md   (portfolio binary / rated gates)
          # gh pr comment $PR_NUMBER --body-file review-output.md
          echo "Automated review stub — attach codereview.md + CHECKLIST.md to the model context."
          BODY="**AI PR Review (stub)** — Review against [.github/code-review/codereview.md](https://github.com/${{ github.repository }}/blob/${{ github.head_ref }}/.github/code-review/codereview.md) and [.github/code-review/CHECKLIST.md](https://github.com/${{ github.repository }}/blob/${{ github.head_ref }}/.github/code-review/CHECKLIST.md)."
          gh pr comment "$PR_NUMBER" --body "$BODY"
